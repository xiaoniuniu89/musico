<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>{% block title %}Musico - Studio Management{% endblock %}</title>
    <style>
      :root {
        --ink: #12263a;
        --ink-soft: #4a6178;
        --surface: #f4f7fb;
        --card: #ffffff;
        --line: #d6dfeb;
        --line-strong: #b4c3d3;
        --brand: #0f766e;
        --brand-press: #0b5f59;
        --brand-soft: #d7f3ef;
        --ok: #2f9e44;
        --warn: #f08c00;
        --err: #c92a2a;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        color: var(--ink);
        background:
          radial-gradient(1200px 600px at 100% -10%, #d3f4ff 0%, transparent 60%),
          linear-gradient(180deg, #f7fbff 0%, var(--surface) 100%);
        font-family: "Manrope", "Avenir Next", "Segoe UI", sans-serif;
        line-height: 1.5;
      }

      a {
        color: var(--brand);
        text-decoration: none;
      }

      a:hover {
        text-decoration: underline;
      }

      .container {
        max-width: 1000px;
        margin: 0 auto;
        padding: 0 1.5rem;
      }

      header {
        padding: 1.5rem 0;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .brand {
        font-size: 1.5rem;
        font-weight: 800;
        color: var(--ink);
        text-decoration: none;
      }

      nav {
        display: flex;
        gap: 1.5rem;
        align-items: center;
      }

      .btn {
        display: inline-block;
        padding: 0.6rem 1.2rem;
        border-radius: 8px;
        font-weight: 600;
        cursor: pointer;
        border: 1px solid transparent;
        transition: all 0.2s;
      }

      .btn-primary {
        background: var(--brand);
        color: #fff;
      }

      .btn-primary:hover {
        background: var(--brand-press);
        text-decoration: none;
      }

      .btn-outline {
        border-color: var(--brand);
        color: var(--brand);
      }

      .btn-outline:hover {
        background: var(--brand-soft);
        text-decoration: none;
      }

      section {
        padding: 4rem 0;
      }

      .hero {
        text-align: center;
        max-width: 800px;
        margin: 0 auto;
      }

      .hero h1 {
        font-size: 3rem;
        margin-bottom: 1rem;
        line-height: 1.1;
      }

      .hero p {
        font-size: 1.25rem;
        color: var(--ink-soft);
        margin-bottom: 2rem;
      }

      .card {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 2rem;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      }

      .flash {
        padding: 1rem;
        border-radius: 8px;
        margin-bottom: 1.5rem;
        text-align: center;
      }

      .flash.success {
        background: #ebfbee;
        color: #2b8a3e;
        border: 1px solid #b2f2bb;
      }

      .flash.error {
        background: #fff5f5;
        color: var(--err);
        border: 1px solid #ffc9c9;
      }

      footer {
        padding: 2rem 0;
        text-align: center;
        color: var(--ink-soft);
        font-size: 0.9rem;
        border-top: 1px solid var(--line);
        margin-top: 4rem;
      }

      .form-group {
        margin-bottom: 1.5rem;
      }

      .form-group label {
        display: block;
        margin-bottom: 0.5rem;
        font-weight: 600;
        color: var(--ink-soft);
      }

      input, textarea {
        width: 100%;
        padding: 0.75rem;
        border: 1px solid var(--line-strong);
        border-radius: 8px;
        font-size: 1rem;
      }

      textarea {
        min-height: 150px;
      }

      @media (max-width: 600px) {
        .hero h1 {
          font-size: 2.25rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header>
        <a href="{% url 'landing_page' %}" class="brand">Musico</a>
        <nav>
          <a href="{% url 'contact' %}">Beta Access</a>
          <a href="{% url 'web_login' %}" class="btn btn-outline">Log in</a>
        </nav>
      </header>

      {% if messages %}
        {% for m in messages %}
          <div class="flash {% if m.tags %}{{ m.tags }}{% endif %}">{{ m }}</div>
        {% endfor %}
      {% endif %}

      {% block content %}{% endblock %}

      <footer>
        <p>&copy; 2026 Musico. All rights reserved.</p>
      </footer>
    </div>
  </body>
</html>
