# fly.toml app configuration file generated for musico-teach on 2026-03-13T17:04:14Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'musico-teach'
primary_region = 'lhr'

[build]
  dockerfile = 'Dockerfile'

[env]
  APP_PORTAL_BASE_DOMAIN = 'musico-teach.fly.dev'
  DJANGO_ALLOWED_HOSTS = '*'
  DJANGO_CSRF_TRUSTED_ORIGINS = 'https://musico-teach.fly.dev,https://portal.ccpiano.ie'
  DJANGO_DEBUG = 'False'

[mounts]
  source = 'musico_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
  cpus = 1
  memory_mb = 512
